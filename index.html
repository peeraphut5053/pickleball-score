// ── Helpers ──────────────────────────────────────────────────────────────────

const parseTime = s => { const [h,m]=s.split(':').map(Number); return h*60+m; };

const thaiDate = (ts=Date.now()) => new Date(ts).toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
const thaiDateTime = (ts) => new Date(ts).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'});
const defaultTournamentName = () => `การแข่งขัน ${thaiDate()}`;

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
// Singles: round-robin จนครบทุกคู่ แล้ววนซ้ำจนเต็มเวลา (เล่นเท่ากัน)
function buildSinglesSchedule(players, maxGames) {
  const list=[...players];
  if(list.length%2!==0) list.push({id:'BYE',name:'BYE'});
  const n=list.length;
  const baseRounds=[];
  for(let r=0;r<n-1;r++){
    const round=[];
    for(let i=0;i<n/2;i++){const h=list[i],a=list[n-1-i];if(h.id!=='BYE'&&a.id!=='BYE')round.push({home:h,away:a});}
    baseRounds.push(round);
    list.splice(1,0,list.pop());
  }
  const allGames=[];
  let pass=0;
  while(allGames.length<maxGames){
    const rounds=pass%2===0?baseRounds:[...baseRounds].reverse();
    for(const round of rounds){
      for(const m of round){
        if(allGames.length>=maxGames) break;
        allGames.push({home:m.home,away:m.away});
      }
      if(allGames.length>=maxGames) break;
    }
    pass++;
    if(pass>100) break; // safety
  }
  return allGames;
}

// Doubles: สร้างทุก match ที่เป็นไปได้ แล้วเลือกให้ทุกคนเล่นเท่ากันจนเต็มเวลา
function buildDoublesSchedule(players, maxGames) {
  const n=players.length;
  if(n<4) return [];

  // สร้าง match ทั้งหมดที่เป็นไปได้ (เลือก 4 คน แล้วแบ่ง 3 วิธี)
  const allMatches=[];
  for(let a=0;a<n;a++) for(let b=a+1;b<n;b++) for(let c=b+1;c<n;c++) for(let d=c+1;d<n;d++){
    const four=[players[a],players[b],players[c],players[d]];
    allMatches.push({home:[four[0],four[1]],away:[four[2],four[3]]});
    allMatches.push({home:[four[0],four[2]],away:[four[1],four[3]]});
    allMatches.push({home:[four[0],four[3]],away:[four[1],four[2]]});
  }

  // Greedy: เลือก match ที่ทำให้ play count สม่ำเสมอที่สุด
  const playCounts={};
  players.forEach(p=>playCounts[p.id]=0);
  const selected=[];
  const pool=shuffle(allMatches);

  while(selected.length<maxGames){
    // หา match ที่ทำให้ผลรวม play count น้อยที่สุด (คนที่เล่นน้อยได้เล่นก่อน)
    let bestIdx=-1, bestScore=Infinity;
    for(let i=0;i<pool.length;i++){
      const m=pool[i];
      const involved=[...m.home,...m.away];
      const score=involved.reduce((s,p)=>s+playCounts[p.id],0);
      // คนที่เล่นน้อยต้องได้ก่อน
      const maxInvolved=Math.max(...involved.map(p=>playCounts[p.id]));
      const minAll=Math.min(...Object.values(playCounts));
      if(maxInvolved<=minAll+2 && score<bestScore){bestScore=score;bestIdx=i;}
    }
    if(bestIdx===-1){
      // ไม่มีตัวเลือกที่ fair แล้ว — เลือก match แรกสุดในกอง
      if(pool.length===0) break;
      bestIdx=0;
    }
    const [picked]=pool.splice(bestIdx,1);
    selected.push(picked);
    [...picked.home,...picked.away].forEach(p=>playCounts[p.id]++);
    // วน pool ถ้าหมด
    if(pool.length===0) pool.push(...shuffle(allMatches));
  }
  return selected;
}

// ── Admin session (sessionStorage) ──────────────────────────────────────────

// ── Firebase hooks ───────────────────────────────────────────────────────────
function useSession(sessionId) {
  const [session,setSession]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!sessionId){setLoading(false);return;}
    const ref=db.ref(`sessions/${sessionId}`);
    ref.on('value',snap=>{setSession(snap.val());setLoading(false);});
    return ()=>ref.off();
  },[sessionId]);
  return {session,loading};
}
function useAllSessions() {
  const [sessions,setSessions]=useState([]);
  useEffect(()=>{
    const ref=db.ref('sessions').orderByChild('createdAt').limitToLast(50);
    ref.on('value',snap=>{
      const data=snap.val()||{};
      setSessions(Object.entries(data).map(([id,s])=>({id,...s})).reverse());
    });
    return ()=>ref.off();
  },[]);
  return sessions;
}
function useMasterPlayers() {
  const [players,setPlayers]=useState({});
  useEffect(()=>{
    const ref=db.ref('masterPlayers');
    ref.on('value',snap=>setPlayers(snap.val()||{}));
    return ()=>ref.off();
  },[]);
  return players;
}

// ── Games Tab ────────────────────────────────────────────────────────────────
function GamesTab({session,sessionId,isAdmin}){
  const [modal,setModal]=useState(null);
  const {config,schedule=[],scores={},name:sessionName}=session;
  const {gameType,pointsPerGame,avgMinutes,startTime}=config;
  const lbl=t=>gameType==='doubles'?t.map(p=>p.name).join(' & '):t.name;
  const done=schedule.filter(g=>scores[g.id]).length;

  const saveScore=(gameId,h,a)=>db.ref(`sessions/${sessionId}/scores/${gameId}`).set({home:h,away:a});
  const clearScore=(gameId)=>db.ref(`sessions/${sessionId}/scores/${gameId}`).remove();

  return(
    <div className="space-y-4">
      <ShareBanner sessionId={sessionId} isAdmin={isAdmin} sessionName={sessionName}/>
      <div className="flex items-center gap-3">
        <div><h2 className="font-bold text-xl">🏓 ตารางแข่งขัน</h2><p className="text-white/50 text-xs">{done}/{schedule.length} เกมเสร็จสิ้น</p></div>
        <div className="ml-auto text-2xl font-black neon-green">{Math.round(done/schedule.length*100)||0}%</div>
      </div>
      <div className="h-2 bg-white/10 rounded-full overflow-hidden">
        <div className="h-full bg-gradient-to-r from-green-400 to-teal-400 transition-all duration-500 rounded-full" style={{width:`${done/schedule.length*100}%`}}/>
      </div>
      <div className="space-y-3">
        {schedule.map((game,idx)=>{
          const sc=scores[game.id];const isDone=!!sc;
          const winner=isDone?(sc.home>sc.away?'home':sc.away>sc.home?'away':'draw'):null;
          return(
            <div key={game.id} onClick={()=>isAdmin&&setModal({...game,homeScore:sc?.home,awayScore:sc?.away})}
              className={`card rounded-2xl p-4 transition-all ${isAdmin?'cursor-pointer hover:-translate-y-0.5':''} ${isDone?'completed-game':'pending-game'}`}>
              <div className="flex items-center justify-between mb-2 text-xs text-white/40">
                <span className="font-mono">เกมที่ {game.gameNum}</span>
                <span className="font-mono">{formatTime(parseTime(startTime)+idx*avgMinutes)}</span>
                {isDone?<span className="bg-green-400/20 text-green-400 px-2 py-0.5 rounded-full">✓ เสร็จ</span>
                  :<span className="bg-white/10 text-white/50 px-2 py-0.5 rounded-full">⏳ รอ</span>}
              </div>
              <div className="flex items-center gap-3">
                <div className={`flex-1 text-center ${isDone&&winner==='home'?'text-green-400 font-black':''}`}>
                  <p className="text-sm font-semibold truncate">{lbl(game.home)}</p>
                  {isDone&&<p className="text-2xl font-black">{sc.home}</p>}
                </div>
                <div className="text-lg font-black text-white/30">VS</div>
                <div className={`flex-1 text-center ${isDone&&winner==='away'?'text-green-400 font-black':''}`}>
                  <p className="text-sm font-semibold truncate">{lbl(game.away)}</p>
                  {isDone&&<p className="text-2xl font-black">{sc.away}</p>}
                </div>
              </div>
              {!isDone&&(isAdmin?<p className="text-center text-white/30 text-xs mt-2">แตะเพื่อบันทึกคะแนน</p>:<p className="text-center text-white/30 text-xs mt-2">รอผู้จัดบันทึก</p>)}
            </div>
          );
        })}
      </div>
      {modal&&<ScoreModal game={modal} pointsPerGame={pointsPerGame} gameType={gameType}
        onClose={()=>setModal(null)}
        onSave={(h,a)=>{saveScore(modal.id,h,a);setModal(null);}}
        onClear={()=>{clearScore(modal.id);setModal(null);}}/>}
    </div>
  );
}

// ── Results Tab ──────────────────────────────────────────────────────────────
function ResultsTab({session,sessionId,isAdmin,onReset}){
  const {config,schedule=[],scores={},players=[],name:sessionName}=session;
  const {gameType}=config;
  const lbl=t=>gameType==='doubles'?t.map(p=>p.name).join(' & '):t.name;
  const [confirmDelete,setConfirmDelete]=useState(false);

  const standings=useMemo(()=>{
    const map={};
    players.forEach(p=>{map[p.id]={...p,w:0,l:0,pf:0,pa:0,games:0};});
    schedule.forEach(game=>{
      const sc=scores[game.id];if(!sc)return;
      const hIds=gameType==='doubles'?game.home.map(p=>p.id):[game.home.id];
      const aIds=gameType==='doubles'?game.away.map(p=>p.id):[game.away.id];
      hIds.forEach(id=>{if(!map[id])return;map[id].pf+=sc.home;map[id].pa+=sc.away;map[id].games++;sc.home>sc.away?map[id].w++:map[id].l++;});
      aIds.forEach(id=>{if(!map[id])return;map[id].pf+=sc.away;map[id].pa+=sc.home;map[id].games++;sc.away>sc.home?map[id].w++:map[id].l++;});
    });
    return Object.values(map).sort((a,b)=>b.w!==a.w?b.w-a.w:(b.pf-b.pa)-(a.pf-a.pa));
  },[schedule,scores,players,gameType]);

  const top=standings[0];
  const doneCount=schedule.filter(g=>scores[g.id]).length;

  const handleDeleteSession=async()=>{
    await db.ref(`sessions/${sessionId}`).remove();
    onReset();
  };

  return(
    <div className="space-y-5">
      <ShareBanner sessionId={sessionId} isAdmin={isAdmin} sessionName={sessionName}/>
      {doneCount>0&&top?.games>0&&(

// ── Stats Tab ────────────────────────────────────────────────────────────────
function StatsTab({allSessions}){
  const [selected,setSelected]=useState(null); // player name

  // Build per-player, per-session stats
  const {playerStats, playerDays} = useMemo(()=>{
    const pStats={}; // name -> { total w/l/pf/pa/games, days:[] }
    const pDays={};  // name -> [ {sessionId, name, date, w, l, pf, pa, games, gameResults:[]} ]

    allSessions.forEach(s=>{
      const {id,name:sName,schedule=[],scores={},config={},players=[],createdAt}=s;
      const gt=config.gameType;

      // init players seen in this session
      const seenNames=new Set(players.map(p=>p.name));
      seenNames.forEach(name=>{
        if(!pStats[name]) pStats[name]={name,w:0,l:0,pf:0,pa:0,games:0,sessions:0};
        if(!pDays[name]) pDays[name]=[];
        pStats[name].sessions++;
        pDays[name].push({sessionId:id,sessionName:sName||`#${id}`,date:createdAt,w:0,l:0,pf:0,pa:0,games:0,gameResults:[]});
      });

      schedule.forEach(game=>{
        const sc=scores[game.id]; if(!sc) return;
        const hNames=gt==='doubles'?game.home.map(p=>p.name):[game.home.name];
        const aNames=gt==='doubles'?game.away.map(p=>p.name):[game.away.name];
        const opponentLabel=(names)=>names.join(' & ');

        hNames.forEach(name=>{
          if(!pStats[name]) return;
          const win=sc.home>sc.away; const loss=sc.home<sc.away;
          pStats[name].pf+=sc.home; pStats[name].pa+=sc.away; pStats[name].games++;
          win?pStats[name].w++:loss?pStats[name].l++:null;
          const day=pDays[name]?.find(d=>d.sessionId===id);
          if(day){
            day.pf+=sc.home; day.pa+=sc.away; day.games++;
            win?day.w++:loss?day.l++:null;
            day.gameResults.push({
              myTeam: hNames.join(' & '), opponent: opponentLabel(aNames),
              myScore:sc.home, oppScore:sc.away, win, loss
            });
          }
        });
        aNames.forEach(name=>{
          if(!pStats[name]) return;
          const win=sc.away>sc.home; const loss=sc.away<sc.home;
          pStats[name].pf+=sc.away; pStats[name].pa+=sc.home; pStats[name].games++;
          win?pStats[name].w++:loss?pStats[name].l++:null;
          const day=pDays[name]?.find(d=>d.sessionId===id);
          if(day){
            day.pf+=sc.away; day.pa+=sc.home; day.games++;
            win?day.w++:loss?day.l++:null;
            day.gameResults.push({
              myTeam: aNames.join(' & '), opponent: opponentLabel(hNames),
              myScore:sc.away, oppScore:sc.home, win, loss
            });
          }
        });
      });
    });

    // sort each player's days newest first
    Object.values(pDays).forEach(days=>days.sort((a,b)=>b.date-a.date));
    const sorted=Object.values(pStats).filter(p=>p.games>0).sort((a,b)=>b.w!==a.w?b.w-a.w:(b.pf-b.pa)-(a.pf-a.pa));
    return {playerStats:sorted, playerDays:pDays};
  },[allSessions]);

  if(!playerStats.length) return(
    <div className="text-center py-16 space-y-3"><div className="text-5xl">📊</div><p className="text-white/40">ยังไม่มีสถิติ</p></div>
  );

  // Detail view for selected player
  if(selected){
    const p=playerStats.find(x=>x.name===selected);
    const days=playerDays[selected]||[];
    const wr=p.games>0?Math.round(p.w/p.games*100):0;
    const diff=p.pf-p.pa;
    const c=chipColor(p.name);
    return(
      <div className="space-y-4 slide-up">
        <button onClick={()=>setSelected(null)} className="flex items-center gap-2 text-white/50 hover:text-white text-sm transition-all">← กลับ</button>

        {/* Header card */}
        <div className="card rounded-2xl p-5 space-y-4">
          <div className="flex items-center gap-3">
            <div className={`w-14 h-14 rounded-full bg-gradient-to-br ${c} flex items-center justify-center font-black text-2xl shrink-0`}>{p.name[0]}</div>
            <div>
              <p className="font-black text-2xl">{p.name}</p>
              <p className="text-white/50 text-sm">{p.sessions} session · {p.games} เกมทั้งหมด</p>
            </div>
            <div className="ml-auto text-right">
              <p className="font-black text-3xl neon-green">{wr}%</p>
              <p className="text-white/40 text-xs">Win Rate</p>
            </div>
          </div>
          <div className="h-2.5 bg-white/10 rounded-full overflow-hidden">
            <div className="h-full bg-gradient-to-r from-green-400 to-teal-400 rounded-full transition-all" style={{width:`${wr}%`}}/>
          </div>
          <div className="grid grid-cols-4 gap-2 text-center">
            {[['ชนะ',p.w,'text-green-400'],['แพ้',p.l,'text-red-400'],['ได้',p.pf,'text-white'],['เสีย',p.pa,'text-white/60']].map(([l,v,cls])=>(
              <div key={l} className="bg-white/5 rounded-xl p-2"><p className={`font-black text-xl ${cls}`}>{v}</p><p className="text-white/40 text-xs">{l}</p></div>
            ))}
          </div>
          <div className="flex justify-between text-sm border-t border-white/10 pt-3">
            <span className="text-white/50">ผลต่างลูกรวม</span>
            <span className={`font-bold text-lg ${diff>0?'text-green-400':diff<0?'text-red-400':'text-white/50'}`}>{diff>0?'+':''}{diff}</span>
          </div>
        </div>

        {/* Day-by-day */}
        <h3 className="font-bold text-lg">📅 ประวัติรายวัน</h3>
        {days.filter(d=>d.games>0).map((day,di)=>{
          const dwr=day.games>0?Math.round(day.w/day.games*100):0;
          const ddiff=day.pf-day.pa;
          return(
            <div key={day.sessionId} className="card rounded-2xl overflow-hidden">
              {/* Day header */}
              <div className="p-4 border-b border-white/10 flex items-center justify-between">
                <div>
                  <p className="font-bold truncate">{day.sessionName}</p>
                  <p className="text-white/40 text-xs mt-0.5">{day.date?thaiDateTime(day.date):''}</p>
                </div>
                <div className="text-right shrink-0 ml-3">
                  <p className={`font-black text-xl ${dwr>=50?'text-green-400':'text-red-400'}`}>{dwr}%</p>
                  <p className="text-white/40 text-xs">{day.w}W {day.l}L</p>
                </div>
              </div>
              {/* Day summary bar */}
              <div className="px-4 py-2 flex gap-4 text-xs border-b border-white/5 bg-white/3">
                <span className="text-white/50">{day.games} เกม</span>
                <span className="text-green-400">+{day.pf} ลูก</span>
                <span className="text-red-400">-{day.pa} ลูก</span>
                <span className={`font-bold ml-auto ${ddiff>0?'text-green-400':ddiff<0?'text-red-400':'text-white/40'}`}>{ddiff>0?'+':''}{ddiff}</span>
              </div>
              {/* Individual game results */}
              <div className="divide-y divide-white/5">
                {day.gameResults.map((gr,gi)=>(
                  <div key={gi} className="px-4 py-3 flex items-center gap-3">
                    <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-black shrink-0 ${gr.win?'bg-green-400/20 text-green-400':gr.loss?'bg-red-400/20 text-red-400':'bg-white/10 text-white/50'}`}>
                      {gr.win?'W':gr.loss?'L':'D'}
                    </span>
                    <div className="flex-1 min-w-0">
                      <p className="text-xs text-white/40 truncate">คู่ของฉัน: <span className="text-white/70">{gr.myTeam}</span></p>
                      <p className="text-xs text-white/40 truncate">คู่ต่อสู้: <span className="text-white/70">{gr.opponent}</span></p>
                    </div>
                    <div className={`text-right shrink-0 font-black text-lg ${gr.win?'text-green-400':gr.loss?'text-red-400':'text-white/50'}`}>
                      {gr.myScore}<span className="text-white/30 font-normal text-sm mx-1">:</span>{gr.oppScore}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
        {days.filter(d=>d.games>0).length===0&&<p className="text-center text-white/30 py-8">ยังไม่มีเกมที่บันทึกคะแนน</p>}
      </div>
    );
  }

  // Overview list
  return(
    <div className="space-y-4">
      <h2 className="font-bold text-xl">📊 สถิติผู้เล่น <span className="text-sm font-normal text-white/40">(แตะเพื่อดูรายละเอียด)</span></h2>
      {playerStats.map((p,idx)=>{
        const wr=p.games>0?Math.round(p.w/p.games*100):0;
        const diff=p.pf-p.pa;
        const c=chipColor(p.name);
        const days=(playerDays[p.name]||[]).filter(d=>d.games>0);
        return(
          <div key={p.name} onClick={()=>setSelected(p.name)} className="card rounded-2xl p-4 space-y-3 cursor-pointer hover:-translate-y-0.5 transition-all">
            <div className="flex items-center gap-3">
              <div className={`w-10 h-10 rounded-full bg-gradient-to-br ${c} flex items-center justify-center font-black text-lg shrink-0`}>{p.name[0]}</div>
              <div>
                <p className="font-bold text-lg">{p.name}</p>
                <p className="text-white/50 text-xs">{days.length} วันที่เล่น · {p.games} เกมรวม</p>

                <p className="text-white/40 text-xs">Win Rate</p>

                <div key={l} className="bg-white/5 rounded-xl p-2"><p className={`font-black text-lg ${cls}`}>{v}</p><p className="text-white/40 text-xs">{l}</p></div>

// ── History Tab ──────────────────────────────────────────────────────────────
function HistoryTab({allSessions,onOpen,isAdmin}){
  const [confirmDel,setConfirmDel]=useState(null);

  const deleteSession=async(id)=>{
    await db.ref(`sessions/${id}`).remove();
    setConfirmDel(null);
  };

  if(!allSessions.length) return(
    <div className="text-center py-16 space-y-3"><div className="text-5xl">📅</div><p className="text-white/40">ยังไม่มีประวัติ</p></div>
  );
  return(
    <div className="space-y-4">
      <h2 className="font-bold text-xl">📅 ประวัติการแข่งขัน</h2>
      {allSessions.map(s=>{
        const {id,config={},players=[],schedule=[],scores={},createdAt,name:sName}=s;
        const done=schedule.filter(g=>scores[g.id]).length;
        const pct=schedule.length>0?Math.round(done/schedule.length*100):0;
        const map={};
        players.forEach(p=>{map[p.id]={name:p.name,w:0,games:0};});
        schedule.forEach(game=>{
          const sc=scores[game.id];if(!sc)return;
          const hIds=config.gameType==='doubles'?game.home.map(p=>p.id):[game.home.id];
          const aIds=config.gameType==='doubles'?game.away.map(p=>p.id):[game.away.id];
          hIds.forEach(pid=>{if(map[pid]){map[pid].games++;if(sc.home>sc.away)map[pid].w++;}});
          aIds.forEach(pid=>{if(map[pid]){map[pid].games++;if(sc.away>sc.home)map[pid].w++;}});
        });
        const winner=Object.values(map).sort((a,b)=>b.w-a.w)[0];
        return(
          <div key={id} className="card rounded-2xl p-4 space-y-3">
            <div className="flex items-start justify-between gap-2">
              <div className="flex-1 cursor-pointer" onClick={()=>onOpen(id)}>
                <p className="font-bold truncate">{sName||`#${id}`}</p>
                <p className="text-white/40 text-xs mt-0.5">{config.gameType==='singles'?'1v1':'2v2'} · {config.pointsPerGame} คะแนน/เกม · {createdAt?thaiDateTime(createdAt):''}</p>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                <span className={`text-xs px-2 py-0.5 rounded-full font-bold ${pct===100?'bg-green-400/20 text-green-400':'bg-yellow-400/20 text-yellow-400'}`}>{pct===100?'✓ จบ':`${pct}%`}</span>
                {isAdmin&&<button onClick={e=>{e.stopPropagation();setConfirmDel(s);}} className="text-red-400 hover:text-red-300 text-lg leading-none">🗑</button>}
              </div>
            </div>
            <div className="flex flex-wrap gap-1.5 cursor-pointer" onClick={()=>onOpen(id)}>
              {players.map(p=><PlayerChip key={p.id} name={p.name}/>)}
            </div>
            <div className="flex items-center justify-between text-xs cursor-pointer" onClick={()=>onOpen(id)}>
              <span className="text-white/40">{done}/{schedule.length} เกม · #{id}</span>
              {winner?.games>0&&<span className="text-yellow-400 font-bold">🏆 {winner.name}</span>}
            </div>
            <div className="h-1 bg-white/10 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-green-400 to-teal-400 rounded-full" style={{width:`${pct}%`}}/>
            </div>
          </div>
        );
      })}
      {confirmDel&&<ConfirmModal title="ลบการแข่งขัน?" desc={`"${confirmDel.name||confirmDel.id}" จะถูกลบถาวร`} onConfirm={()=>deleteSession(confirmDel.id)} onClose={()=>setConfirmDel(null)}/>}
    </div>
  );
}

function CreateTournament({onStart,isAdmin}){

  const [addNameErr,setAddNameErr]=useState('');
  const [gameType,setGameType]=useState('doubles');
  const [pts,setPts]=useState(7);
  const [avgMin,setAvgMin]=useState(10);
  const [startTime,setStartTime]=useState('20:00');
  const [endTime,setEndTime]=useState('22:00');
  const [tournamentName,setTournamentName]=useState(defaultTournamentName());

  const allPlayerNames=useMemo(()=>{
    const set=new Set([...PRESET_PLAYERS,...Object.keys(masterPlayers)]);
    return [...set];
  },[masterPlayers]);

  const removePlayerFromMaster=async(name)=>db.ref(`masterPlayers/${name}`).remove();

  const togglePlayer=(name)=>{
    if(players.find(p=>p.name===name)) setPlayers(prev=>prev.filter(p=>p.name!==name));
    else setPlayers(prev=>[...prev,{id:`p-${name}`,name}]);
  };

  const addCustom=()=>{
    const name=newName.trim(); if(!name) return;
    if(allPlayerNames.includes(name)){togglePlayer(name);setNewName('');return;}
    db.ref(`masterPlayers/${name}`).set({name,addedAt:Date.now()});
    setPlayers(prev=>prev.find(p=>p.name===name)?prev:[...prev,{id:`p-${name}`,name}]);
    setNewName('');
  };

  const minPl=gameType==='singles'?2:4;
  const canStart=players.length>=minPl;
  const totalMin=parseTime(endTime)-parseTime(startTime);
  const estGames=avgMin>0?Math.floor(totalMin/avgMin):0;

  return(
    <div className="space-y-4 slide-up">
      {/* Tournament name */}
      <div className="card rounded-2xl p-5 space-y-2">

      {/* Game type */}

        <div className="grid grid-cols-2 gap-3">

      {/* Player selection */}

        <h2 className="font-bold text-lg flex items-center justify-between">

        </h2>
        <div>
          <p className="text-xs text-white/40 mb-2">แตะเพื่อเลือก/ยกเลิก</p>
          <div className="flex flex-wrap gap-2">
            {allPlayerNames.map(name=>{
              const sel=!!players.find(p=>p.name===name);
              return(
                <div key={name} className="relative group">
                  <PlayerChip name={name} selected={sel} onClick={()=>togglePlayer(name)}/>
                  {isAdmin&&!PRESET_PLAYERS.includes(name)&&(
                    <button onClick={()=>removePlayerFromMaster(name)}
                      className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-white text-xs hidden group-hover:flex items-center justify-center">×</button>
                  )}
                </div>
              );
            })}
          </div>
        </div>
        <div className="border-t border-white/10 pt-3 space-y-2">
          <p className="text-xs text-white/40">เพิ่มผู้เล่นใหม่</p>
          <div className="flex gap-2">
            <input value={newName} onChange={e=>{setNewName(e.target.value);setAddNameErr('');}}
              onKeyDown={e=>e.key==='Enter'&&addCustom()}
              placeholder="ชื่อผู้เล่นใหม่..." maxLength={20} className="flex-1 input-base"/>
            <button onClick={addCustom} className="btn-primary px-4 py-2.5 rounded-xl whitespace-nowrap">+ เพิ่ม</button>
          </div>
          {addNameErr&&<p className="text-red-400 text-xs">{addNameErr}</p>}
        </div>
        {players.length>0&&(
          <div className="border-t border-white/10 pt-3">
            <p className="text-xs text-white/40 mb-2">ผู้เล่นที่เลือก</p>
            <div className="flex flex-wrap gap-2">
              {players.map(p=><PlayerChip key={p.id} name={p.name} onRemove={()=>setPlayers(prev=>prev.filter(x=>x.id!==p.id))}/>)}
            </div>
          </div>
        )}
      </div>

      {/* Settings */}
      <div className="card rounded-2xl p-5 space-y-4">
        <h2 className="font-bold text-lg">⚙️ ตั้งค่า</h2>
        <div className="space-y-1.5">
          <label className="text-sm text-white/60">คะแนนต่อเกม</label>
          <div className="grid grid-cols-5 gap-1">
            {[5,7,11,15,21].map(p=>(
              <button key={p} onClick={()=>setPts(p)} className={`py-2 rounded-lg text-sm font-bold border transition-all ${pts===p?'border-green-400 bg-green-400/20 text-green-300':'border-white/20'}`}>{p}</button>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-3 gap-3">
          <div className="space-y-1"><label className="text-xs text-white/60">นาที/เกม</label>
            <input type="number" value={avgMin} min={5} max={60} onChange={e=>setAvgMin(Number(e.target.value))} className="input-base text-center"/></div>
          <div className="space-y-1"><label className="text-xs text-white/60">เริ่ม</label>
            <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)} className="input-base"/></div>
          <div className="space-y-1"><label className="text-xs text-white/60">สิ้นสุด</label>
            <input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)} className="input-base"/></div>
        </div>
        {canStart&&totalMin>0&&<div className="rounded-xl p-3 text-xs bg-green-400/10 border border-green-400/20 space-y-1.5">
          <div className="flex justify-between"><span className="text-white/60">เวลาทั้งหมด</span><span className="font-bold">{totalMin} นาที ({totalMin/60} ชม.)</span></div>
          <div className="flex justify-between"><span className="text-white/60">เกมละ</span><span className="font-bold">{avgMin} นาที</span></div>
          <div className="flex justify-between border-t border-white/10 pt-1.5">
            <span className="text-white/60">จำนวนเกม</span>
            <span className="font-black text-green-400 text-sm">{estGames} เกม</span>
          </div>
          <div className="flex justify-between">
            <span className="text-white/60">แต่ละคนเล่นประมาณ</span>
            <span className="font-bold">{players.length>0?(gameType==='doubles'?Math.round(estGames*4/players.length):Math.round(estGames*2/players.length)):'-'} เกม</span>
          </div>
        </div>}
      </div>

      <button disabled={!canStart}
        onClick={()=>onStart({players,gameType,pointsPerGame:pts,avgMinutes:avgMin,startTime,endTime,tournamentName:tournamentName||defaultTournamentName()})}
        className={`w-full py-4 rounded-2xl text-lg font-black transition-all ${canStart?'btn-primary shadow-lg':'bg-white/10 text-white/30 cursor-not-allowed'}`}>
        {canStart?`🚀 สร้าง "${tournamentName||defaultTournamentName()}"`:` ต้องการผู้เล่น ≥${minPl} คน`}
      </button>
    </div>
  );
}

// ── Join Session ──────────────────────────────────────────────────────────────
function JoinSession({onJoin}){
  const [joinId,setJoinId]=useState('');
  const [joining,setJoining]=useState(false);
  const handleJoin=async()=>{
    const id=joinId.trim().toUpperCase(); if(!id) return;
    setJoining(true);
    const snap=await db.ref(`sessions/${id}`).get();
    if(snap.exists()) onJoin(id);
    else{ alert('ไม่พบ Session ID นี้'); setJoining(false); }
  };
  return(
    <div className="card rounded-2xl p-5 space-y-3 slide-up">
      <p className="text-white/60 text-sm">กรอก Session ID ที่ผู้จัดส่งมาให้</p>
      <div className="flex gap-2">
        <input value={joinId} onChange={e=>setJoinId(e.target.value.toUpperCase())} maxLength={6}
          placeholder="AB12CD" onKeyDown={e=>e.key==='Enter'&&handleJoin()}
          className="flex-1 input-base text-center uppercase tracking-widest font-mono text-xl" autoFocus/>
        <button onClick={handleJoin} disabled={joining||!joinId.trim()}
          className="px-5 py-2.5 rounded-xl bg-blue-500 hover:bg-blue-400 font-bold disabled:opacity-40">
          {joining?'...':'เข้าร่วม'}
        </button>
      </div>
    </div>
  );
}

// ── Home Page (no session) ────────────────────────────────────────────────────
function HomePage({onStart,onJoin,allSessions,isAdmin,onAdminLogin,onAdminLogout}){
  // Admin: [สร้าง, ประวัติ, สถิติ]   Non-admin: [ประวัติ, สถิติ, เข้าร่วม]
  const adminTabs   =[['create','➕ สร้างเกม'],['history','📅 ประวัติ'],['stats','📊 สถิติ']];
  const guestTabs   =[['history','📅 ประวัติ'],['stats','📊 สถิติ'],['join','🔗 เข้าร่วม']];
  const tabs        = isAdmin ? adminTabs : guestTabs;
  const [tab,setTab]=useState(tabs[0][0]);

  // Reset tab when admin status changes
  useEffect(()=>{ setTab(isAdmin?'create':'history'); },[isAdmin]);

  return(
    <div className="min-h-screen">
      {/* Top bar */}
      <div className="sticky top-0 z-40 gradient-bg border-b border-white/10">
        <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="text-2xl">🏓</span>
            <span className="font-black text-lg neon-green tracking-wide">PICKLEBALL</span>
          </div>
          {isAdmin
            ? <button onClick={onAdminLogout} className="flex items-center gap-1.5 text-xs text-yellow-400 border border-yellow-400/30 px-3 py-1.5 rounded-full hover:bg-yellow-400/10 transition-all">
                <span>👑</span> ออกจาก Admin
              </button>
            : <button onClick={onAdminLogin} className="flex items-center gap-1.5 text-xs text-white/40 border border-white/10 px-3 py-1.5 rounded-full hover:text-yellow-400 hover:border-yellow-400/30 transition-all">
                <span>🔐</span> Admin
              </button>
          }
        </div>
        <div className="flex border-t border-white/10">
          {tabs.map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)}
              className={`flex-1 py-2.5 text-sm font-bold transition-all ${tab===k?'tab-active':'text-white/50 hover:text-white'}`}>
              {l}
            </button>
          ))}
        </div>
        {isAdmin&&<div className="text-center py-1 bg-yellow-400/10 text-yellow-300 text-xs font-bold">👑 Admin Mode — คุณสามารถสร้างและจัดการการแข่งขันได้</div>}
      </div>

      <div className="max-w-2xl mx-auto p-4">
        {tab==='create' && isAdmin && <CreateTournament onStart={onStart} isAdmin={isAdmin}/>}
        {tab==='history' && <HistoryTab allSessions={allSessions} onOpen={onJoin} isAdmin={isAdmin}/>}
        {tab==='stats'   && <StatsTab allSessions={allSessions}/>}
        {tab==='join'    && <JoinSession onJoin={onJoin}/>}
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const [sessionId,setSessionId]=useState(()=>location.hash.replace('#','')||null);
  const [tab,setTab]=useState('games');
  const [isAdmin,setIsAdmin]=useState(()=>isAdminLoggedIn());
  const [showAdminLogin,setShowAdminLogin]=useState(false);
  const {session,loading}=useSession(sessionId);
  const allSessions=useAllSessions();

  useEffect(()=>{ location.hash=sessionId||''; },[sessionId]);

  const handleStart=async(cfg)=>{
    const id=genId();
    const maxGames=cfg.avgMinutes>0?Math.floor((parseTime(cfg.endTime)-parseTime(cfg.startTime))/cfg.avgMinutes):12;
    let raw=[];
    if(cfg.gameType==='singles') raw=buildSinglesSchedule(cfg.players,maxGames);
    else raw=buildDoublesSchedule(cfg.players,maxGames);
    const games=raw.map((m,i)=>({id:`g-${i+1}`,gameNum:i+1,home:m.home,away:m.away}));
    await db.ref(`sessions/${id}`).set({
      name:cfg.tournamentName,config:cfg,players:cfg.players,
      schedule:games,scores:{},createdAt:Date.now()
    });
    const updates={};
    cfg.players.forEach(p=>{ updates[`masterPlayers/${p.name}`]={name:p.name,addedAt:Date.now()}; });
    await db.ref().update(updates);
    setSessionId(id);
  };

  const handleJoin=(id)=>{ setSessionId(id); };
  const handleReset=()=>{ setSessionId(null); location.hash=''; };
  const handleAdminLogin=()=>{ setShowAdminLogin(true); };
  const handleAdminLogout=()=>{ setAdminLogin(false); setIsAdmin(false); };

  if(loading&&sessionId) return(
    <div className="min-h-screen flex items-center justify-center">
      <div className="text-center space-y-3"><div className="text-5xl">🏓</div><p className="text-white/60">กำลังโหลด...</p></div>
    </div>
  );

  if(!sessionId||!session) return(
    <>
      <HomePage onStart={handleStart} onJoin={handleJoin} allSessions={allSessions}
        isAdmin={isAdmin} onAdminLogin={handleAdminLogin} onAdminLogout={handleAdminLogout}/>
      {showAdminLogin&&<AdminLoginModal onSuccess={()=>{setIsAdmin(true);setShowAdminLogin(false);}} onClose={()=>setShowAdminLogin(false)}/>}
    </>
  );

  return(
    <div className="min-h-screen">
      <div className="sticky top-0 z-40 gradient-bg border-b border-white/10">
        <div className="max-w-2xl mx-auto flex items-stretch">
          {[['games','🏓 เกม'],['results','🏆 ผล'],['stats','📊 สถิติ']].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)}
              className={`flex-1 py-3 text-sm font-bold transition-all ${tab===k?'tab-active':'text-white/50 hover:text-white'}`}>{l}</button>
          ))}
          <button onClick={handleReset} className="px-3 py-3 text-white/30 hover:text-white text-sm transition-all">← กลับ</button>
        </div>
        {isAdmin&&<div className="text-center py-1 bg-yellow-400/10 text-yellow-300 text-xs font-bold">👑 Admin Mode</div>}
      </div>
      <div className="max-w-2xl mx-auto p-4">
        {tab==='games'  &&<GamesTab   session={session} sessionId={sessionId} isAdmin={isAdmin}/>}
        {tab==='results'&&<ResultsTab session={session} sessionId={sessionId} isAdmin={isAdmin} onReset={handleReset}/>}
        {tab==='stats'  &&<StatsTab   allSessions={allSessions}/>}
      </div>
      {showAdminLogin&&<AdminLoginModal onSuccess={()=>{setIsAdmin(true);setShowAdminLogin(false);}} onClose={()=>setShowAdminLogin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
