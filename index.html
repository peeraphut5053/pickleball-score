<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickleball Score Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Sarabun', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .neon-green { color: #39ff14; }
    .neon-border { border-color: #39ff14; box-shadow: 0 0 10px rgba(57,255,20,0.3); }
    .btn-primary { background: linear-gradient(135deg, #39ff14, #00d4aa); color: #000; font-weight: 700; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-danger { background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; font-weight: 700; }
    .score-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; text-align: center; font-size: 1.5rem; font-weight: 700; width: 80px; border-radius: 8px; padding: 8px; }
    .score-input:focus { outline: none; border-color: #39ff14; box-shadow: 0 0 8px rgba(57,255,20,0.5); }
    .tab-active { background: linear-gradient(135deg, #39ff14, #00d4aa); color: #000; }
    .player-badge { background: linear-gradient(135deg, #667eea, #764ba2); }
    .winner-glow { box-shadow: 0 0 30px rgba(57,255,20,0.6), 0 0 60px rgba(57,255,20,0.3); }
    .game-card:hover { transform: translateY(-2px); transition: all 0.2s; }
    .completed-game { border-left: 4px solid #39ff14; }
    .pending-game { border-left: 4px solid rgba(255,255,255,0.2); }
    input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
    .scroll-hidden::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="gradient-bg min-h-screen text-white">
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useMemo } = React;

// ─── Utilities ───────────────────────────────────────────────────────────────
function generateRoundRobin(players) {
  const n = players.length;
  const rounds = [];
  const list = [...players];
  if (n % 2 !== 0) list.push({ id: 'BYE', name: 'BYE' });
  const total = list.length;
  const numRounds = total - 1;
  const half = total / 2;

  for (let r = 0; r < numRounds; r++) {
    const round = [];
    for (let i = 0; i < half; i++) {
      const home = list[i];
      const away = list[total - 1 - i];
      if (home.id !== 'BYE' && away.id !== 'BYE') {
        round.push({ home, away });
      }
    }
    rounds.push(round);
    list.splice(1, 0, list.pop());
  }
  return rounds;
}

function generateDoubles(players) {
  // Pair players and create schedule where every pair plays
  const n = players.length;
  const teams = [];

  if (n < 4) return { teams: [], matches: [] };

  // Create all possible pairs
  const allPairs = [];
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      allPairs.push([players[i], players[j]]);
    }
  }

  // Shuffle pairs
  const shuffled = [...allPairs].sort(() => Math.random() - 0.5);

  // Create team matchups
  const matches = [];
  const used = new Set();

  for (let i = 0; i < shuffled.length; i++) {
    if (used.has(i)) continue;
    for (let j = i + 1; j < shuffled.length; j++) {
      if (used.has(j)) continue;
      const p1 = shuffled[i];
      const p2 = shuffled[j];
      // Check no overlap
      const ids1 = new Set(p1.map(p => p.id));
      const ids2 = new Set(p2.map(p => p.id));
      const overlap = [...ids1].some(id => ids2.has(id));
      if (!overlap) {
        matches.push({ home: p1, away: p2, id: `m-${matches.length}` });
        used.add(i);
        used.add(j);
        break;
      }
    }
  }
  return matches;
}

function parseTime(str) {
  const [h, m] = str.split(':').map(Number);
  return h * 60 + m;
}

function formatTime(minutes) {
  const h = Math.floor(minutes / 60) % 24;
  const m = minutes % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── Components ──────────────────────────────────────────────────────────────

function PlayerChip({ name, onRemove }) {
  const colors = ['from-purple-500 to-pink-500','from-blue-500 to-cyan-500','from-green-500 to-teal-500','from-orange-500 to-red-500','from-yellow-500 to-orange-500','from-indigo-500 to-purple-500'];
  const color = colors[name.charCodeAt(0) % colors.length];
  return (
    <div className={`flex items-center gap-2 px-3 py-2 rounded-full bg-gradient-to-r ${color} text-white font-semibold text-sm`}>
      <span>{name}</span>
      {onRemove && <button onClick={onRemove} className="w-4 h-4 rounded-full bg-white/30 hover:bg-white/50 text-xs flex items-center justify-center font-bold">×</button>}
    </div>
  );
}

function SetupPage({ onStart }) {
  const [players, setPlayers] = useState([]);
  const [newName, setNewName] = useState('');
  const [gameType, setGameType] = useState('singles'); // singles | doubles
  const [pointsPerGame, setPointsPerGame] = useState(11);
  const [avgMinutes, setAvgMinutes] = useState(20);
  const [startTime, setStartTime] = useState('09:00');
  const [endTime, setEndTime] = useState('12:00');

  const addPlayer = () => {
    const name = newName.trim();
    if (!name) return;
    if (players.find(p => p.name === name)) return;
    setPlayers(prev => [...prev, { id: `p-${Date.now()}`, name }]);
    setNewName('');
  };

  const removePlayer = (id) => setPlayers(prev => prev.filter(p => p.id !== id));

  const minPlayers = gameType === 'singles' ? 2 : 4;
  const canStart = players.length >= minPlayers;

  const totalMinutes = parseTime(endTime) - parseTime(startTime);
  const estimatedGames = gameType === 'singles'
    ? (players.length * (players.length - 1)) / 2
    : Math.floor(players.length / 2) * Math.max(1, Math.floor(players.length / 2) - 1);
  const fitsTime = estimatedGames * avgMinutes <= totalMinutes;

  return (
    <div className="max-w-2xl mx-auto p-4 space-y-6">
      {/* Header */}
      <div className="text-center py-6">
        <div className="text-5xl mb-2">🏓</div>
        <h1 className="text-3xl font-black neon-green tracking-wide">PICKLEBALL</h1>
        <p className="text-white/60 text-sm mt-1">Score Tracker & Tournament Manager</p>
      </div>

      {/* Game Type */}
      <div className="card rounded-2xl p-5 space-y-3">
        <h2 className="font-bold text-lg flex items-center gap-2">🎯 ประเภทการแข่งขัน</h2>
        <div className="grid grid-cols-2 gap-3">
          {[['singles','1v1 (ประเภทเดี่ยว)','👤'],['doubles','2v2 (ประเภทคู่)','👥']].map(([val, label, icon]) => (
            <button key={val} onClick={() => setGameType(val)}
              className={`p-3 rounded-xl border-2 font-semibold transition-all ${gameType === val ? 'border-green-400 bg-green-400/20 text-green-300' : 'border-white/20 hover:border-white/40'}`}>
              <div className="text-2xl">{icon}</div>
              <div className="text-sm mt-1">{label}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Players */}
      <div className="card rounded-2xl p-5 space-y-4">
        <h2 className="font-bold text-lg flex items-center gap-2">👥 ผู้เล่น
          <span className="ml-auto text-sm font-normal text-white/50">{players.length} คน (ต้องการ ≥{minPlayers})</span>
        </h2>
        <div className="flex gap-2">
          <input value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addPlayer()}
            placeholder="ชื่อผู้เล่น..." maxLength={20}
            className="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white placeholder-white/40 focus:outline-none focus:border-green-400" />
          <button onClick={addPlayer} className="btn-primary px-4 py-2.5 rounded-xl transition-all">+ เพิ่ม</button>
        </div>
        {players.length > 0 && (
          <div className="flex flex-wrap gap-2">
            {players.map(p => <PlayerChip key={p.id} name={p.name} onRemove={() => removePlayer(p.id)} />)}
          </div>
        )}
        {players.length === 0 && (
          <p className="text-white/30 text-sm text-center py-2">ยังไม่มีผู้เล่น — กรอกชื่อแล้วกด Enter หรือปุ่ม เพิ่ม</p>
        )}
      </div>

      {/* Game Settings */}
      <div className="card rounded-2xl p-5 space-y-4">
        <h2 className="font-bold text-lg flex items-center gap-2">⚙️ ตั้งค่าเกม</h2>
        <div className="grid grid-cols-2 gap-4">
          <div className="space-y-1.5">
            <label className="text-sm text-white/60">ลูกต่อเกม (คะแนน)</label>
            <div className="flex gap-2">
              {[11, 15, 21].map(pt => (
                <button key={pt} onClick={() => setPointsPerGame(pt)}
                  className={`flex-1 py-2 rounded-lg text-sm font-bold border transition-all ${pointsPerGame === pt ? 'border-green-400 bg-green-400/20 text-green-300' : 'border-white/20 hover:border-white/40'}`}>
                  {pt}
                </button>
              ))}
            </div>
          </div>
          <div className="space-y-1.5">
            <label className="text-sm text-white/60">เวลาเฉลี่ย/เกม (นาที)</label>
            <input type="number" value={avgMinutes} min={5} max={60}
              onChange={e => setAvgMinutes(Number(e.target.value))}
              className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-green-400" />
          </div>
        </div>
        <div className="grid grid-cols-2 gap-4">
          <div className="space-y-1.5">
            <label className="text-sm text-white/60">เริ่มเล่น</label>
            <input type="time" value={startTime} onChange={e => setStartTime(e.target.value)}
              className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-green-400" />
          </div>
          <div className="space-y-1.5">
            <label className="text-sm text-white/60">สิ้นสุด</label>
            <input type="time" value={endTime} onChange={e => setEndTime(e.target.value)}
              className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-green-400" />
          </div>
        </div>

        {/* Summary */}
        {canStart && (
          <div className={`rounded-xl p-3 text-sm space-y-1 ${fitsTime ? 'bg-green-400/10 border border-green-400/30' : 'bg-red-400/10 border border-red-400/30'}`}>
            <div className="flex justify-between"><span className="text-white/60">จำนวนเกมทั้งหมด</span><span className="font-bold">{estimatedGames} เกม</span></div>
            <div className="flex justify-between"><span className="text-white/60">เวลาที่ใช้ (ประมาณ)</span><span className="font-bold">{estimatedGames * avgMinutes} นาที</span></div>
            <div className="flex justify-between"><span className="text-white/60">เวลาที่มี</span><span className={`font-bold ${fitsTime ? 'text-green-400' : 'text-red-400'}`}>{totalMinutes} นาที {fitsTime ? '✓' : '⚠️ ไม่พอ'}</span></div>
          </div>
        )}
      </div>

      <button disabled={!canStart}
        onClick={() => onStart({ players, gameType, pointsPerGame, avgMinutes, startTime, endTime })}
        className={`w-full py-4 rounded-2xl text-lg font-black transition-all ${canStart ? 'btn-primary shadow-lg hover:shadow-green-400/30' : 'bg-white/10 text-white/30 cursor-not-allowed'}`}>
        {canStart ? '🚀 เริ่มการแข่งขัน' : `ต้องการผู้เล่นอย่างน้อย ${minPlayers} คน`}
      </button>
    </div>
  );
}

function ScoreModal({ game, pointsPerGame, onSave, onClose, gameType }) {
  const [homeScore, setHomeScore] = useState(game.homeScore ?? '');
  const [awayScore, setAwayScore] = useState(game.awayScore ?? '');

  const getLabel = (team) => {
    if (gameType === 'doubles') return team.map(p => p.name).join(' & ');
    return team.name;
  };

  const valid = homeScore !== '' && awayScore !== '' &&
    Number(homeScore) >= 0 && Number(awayScore) >= 0 &&
    (Number(homeScore) === pointsPerGame || Number(awayScore) === pointsPerGame);

  return (
    <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="card rounded-2xl p-6 w-full max-w-sm space-y-5">
        <div className="text-center">
          <div className="text-2xl mb-1">📝</div>
          <h3 className="font-bold text-lg">บันทึกคะแนน</h3>
          <p className="text-white/50 text-xs">เกมที่ {game.gameNum}</p>
        </div>
        <div className="flex items-center gap-3">
          <div className="flex-1 text-center">
            <p className="text-xs text-white/60 mb-2 truncate">{getLabel(game.home)}</p>
            <input type="number" min={0} max={pointsPerGame + 5} value={homeScore}
              onChange={e => setHomeScore(e.target.value)}
              className="score-input w-full" placeholder="0" autoFocus />
          </div>
          <div className="text-2xl font-black text-white/40">VS</div>
          <div className="flex-1 text-center">
            <p className="text-xs text-white/60 mb-2 truncate">{getLabel(game.away)}</p>
            <input type="number" min={0} max={pointsPerGame + 5} value={awayScore}
              onChange={e => setAwayScore(e.target.value)}
              className="score-input w-full" placeholder="0" />
          </div>
        </div>
        {!valid && homeScore !== '' && awayScore !== '' && (
          <p className="text-red-400 text-xs text-center">ผู้ชนะต้องได้ {pointsPerGame} คะแนน</p>
        )}
        <div className="grid grid-cols-2 gap-3">
          <button onClick={onClose} className="py-2.5 rounded-xl border border-white/20 hover:bg-white/10 transition-all">ยกเลิก</button>
          <button disabled={!valid}
            onClick={() => onSave(Number(homeScore), Number(awayScore))}
            className={`py-2.5 rounded-xl font-bold transition-all ${valid ? 'btn-primary' : 'bg-white/10 text-white/30 cursor-not-allowed'}`}>
            บันทึก ✓
          </button>
        </div>
      </div>
    </div>
  );
}

function GamesPage({ config, schedule, scores, onScore, onBack }) {
  const [modalGame, setModalGame] = useState(null);
  const { gameType, pointsPerGame, avgMinutes, startTime } = config;

  const getLabel = (team) => {
    if (gameType === 'doubles') return team.map(p => p.name).join(' & ');
    return team.name;
  };

  const completedCount = schedule.filter(g => scores[g.id] !== undefined).length;

  return (
    <div className="max-w-2xl mx-auto p-4 space-y-4">
      <div className="flex items-center gap-3 py-2">
        <button onClick={onBack} className="p-2 rounded-xl border border-white/20 hover:bg-white/10">←</button>
        <div>
          <h2 className="font-bold text-xl">🏓 ตารางแข่งขัน</h2>
          <p className="text-white/50 text-xs">{completedCount}/{schedule.length} เกมเสร็จสิ้น</p>
        </div>
        <div className="ml-auto text-right">
          <div className="text-2xl font-black neon-green">{Math.round(completedCount / schedule.length * 100) || 0}%</div>
          <div className="text-xs text-white/50">เสร็จแล้ว</div>
        </div>
      </div>

      {/* Progress */}
      <div className="h-2 bg-white/10 rounded-full overflow-hidden">
        <div className="h-full bg-gradient-to-r from-green-400 to-teal-400 transition-all duration-500 rounded-full"
          style={{ width: `${(completedCount / schedule.length) * 100}%` }} />
      </div>

      {/* Games */}
      <div className="space-y-3">
        {schedule.map((game, idx) => {
          const sc = scores[game.id];
          const done = sc !== undefined;
          const gameStartTime = formatTime(parseTime(startTime) + idx * avgMinutes);
          const gameEndTime = formatTime(parseTime(startTime) + (idx + 1) * avgMinutes);
          let winner = null;
          if (done) winner = sc.home > sc.away ? 'home' : sc.away > sc.home ? 'away' : 'draw';

          return (
            <div key={game.id} className={`card rounded-2xl p-4 game-card cursor-pointer ${done ? 'completed-game' : 'pending-game'}`}
              onClick={() => setModalGame(game)}>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs text-white/40 font-mono">เกมที่ {game.gameNum}</span>
                <span className="text-xs text-white/40 font-mono">{gameStartTime} – {gameEndTime}</span>
                {done ? <span className="text-xs bg-green-400/20 text-green-400 px-2 py-0.5 rounded-full">✓ เสร็จ</span>
                  : <span className="text-xs bg-white/10 text-white/50 px-2 py-0.5 rounded-full">⏳ รอ</span>}
              </div>
              <div className="flex items-center gap-3">
                <div className={`flex-1 text-center ${done && winner === 'home' ? 'text-green-400 font-black' : ''}`}>
                  <p className="text-sm font-semibold truncate">{getLabel(game.home)}</p>
                  {done && <p className="text-2xl font-black">{sc.home}</p>}
                </div>
                <div className="text-lg font-black text-white/30">VS</div>
                <div className={`flex-1 text-center ${done && winner === 'away' ? 'text-green-400 font-black' : ''}`}>
                  <p className="text-sm font-semibold truncate">{getLabel(game.away)}</p>
                  {done && <p className="text-2xl font-black">{sc.away}</p>}
                </div>
              </div>
              {!done && <p className="text-center text-white/30 text-xs mt-2">แตะเพื่อบันทึกคะแนน</p>}
            </div>
          );
        })}
      </div>

      {modalGame && (
        <ScoreModal game={modalGame} pointsPerGame={pointsPerGame} gameType={gameType}
          onClose={() => setModalGame(null)}
          onSave={(h, a) => { onScore(modalGame.id, h, a); setModalGame(null); }} />
      )}
    </div>
  );
}

function ResultsPage({ config, schedule, scores, players, onReset }) {
  const { gameType, pointsPerGame } = config;

  const standings = useMemo(() => {
    const map = {};
    players.forEach(p => {
      map[p.id] = { ...p, w: 0, l: 0, d: 0, pf: 0, pa: 0, games: 0 };
    });

    schedule.forEach(game => {
      const sc = scores[game.id];
      if (!sc) return;
      const homeIds = gameType === 'doubles' ? game.home.map(p => p.id) : [game.home.id];
      const awayIds = gameType === 'doubles' ? game.away.map(p => p.id) : [game.away.id];

      homeIds.forEach(id => {
        if (!map[id]) return;
        map[id].pf += sc.home; map[id].pa += sc.away; map[id].games++;
        if (sc.home > sc.away) map[id].w++; else if (sc.home < sc.away) map[id].l++; else map[id].d++;
      });
      awayIds.forEach(id => {
        if (!map[id]) return;
        map[id].pf += sc.away; map[id].pa += sc.home; map[id].games++;
        if (sc.away > sc.home) map[id].w++; else if (sc.away < sc.home) map[id].l++; else map[id].d++;
      });
    });

    return Object.values(map).sort((a, b) => {
      if (b.w !== a.w) return b.w - a.w;
      return (b.pf - b.pa) - (a.pf - a.pa);
    });
  }, [schedule, scores, players, gameType]);

  const completedGames = schedule.filter(g => scores[g.id] !== undefined).length;
  const winner = standings[0];
  const colors = ['🥇','🥈','🥉'];

  return (
    <div className="max-w-2xl mx-auto p-4 space-y-5">
      <div className="text-center py-4">
        <div className="text-4xl mb-2">🏆</div>
        <h2 className="font-black text-2xl">ผลการแข่งขัน</h2>
        <p className="text-white/50 text-sm">{completedGames}/{schedule.length} เกมเสร็จสิ้น</p>
      </div>

      {/* Winner Card */}
      {completedGames > 0 && winner.games > 0 && (
        <div className="card rounded-2xl p-6 text-center winner-glow border border-green-400/40">
          <div className="text-5xl mb-2">👑</div>
          <p className="text-white/60 text-sm">ผู้นำตาราง</p>
          <h3 className="text-3xl font-black neon-green mt-1">{winner.name}</h3>
          <div className="flex justify-center gap-6 mt-3 text-sm">
            <div><span className="text-white/50">ชนะ </span><span className="font-bold text-green-400">{winner.w}</span></div>
            <div><span className="text-white/50">แพ้ </span><span className="font-bold text-red-400">{winner.l}</span></div>
            <div><span className="text-white/50">+/- </span><span className={`font-bold ${winner.pf - winner.pa >= 0 ? 'text-green-400' : 'text-red-400'}`}>{winner.pf - winner.pa > 0 ? '+' : ''}{winner.pf - winner.pa}</span></div>
          </div>
        </div>
      )}

      {/* Standings Table */}
      <div className="card rounded-2xl overflow-hidden">
        <div className="p-4 border-b border-white/10">
          <h3 className="font-bold">📊 ตารางคะแนน</h3>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-white/40 text-xs border-b border-white/10">
                <th className="p-3 text-left">อันดับ</th>
                <th className="p-3 text-left">ชื่อ</th>
                <th className="p-3 text-center">W</th>
                <th className="p-3 text-center">L</th>
                <th className="p-3 text-center">แต้มได้</th>
                <th className="p-3 text-center">แต้มเสีย</th>
                <th className="p-3 text-center">+/-</th>
              </tr>
            </thead>
            <tbody>
              {standings.map((p, idx) => {
                const diff = p.pf - p.pa;
                return (
                  <tr key={p.id} className={`border-b border-white/5 ${idx === 0 && p.games > 0 ? 'bg-green-400/5' : ''}`}>
                    <td className="p-3 font-bold">{colors[idx] || `${idx+1}.`}</td>
                    <td className="p-3 font-semibold">{p.name}</td>
                    <td className="p-3 text-center text-green-400 font-bold">{p.w}</td>
                    <td className="p-3 text-center text-red-400 font-bold">{p.l}</td>
                    <td className="p-3 text-center">{p.pf}</td>
                    <td className="p-3 text-center">{p.pa}</td>
                    <td className={`p-3 text-center font-bold ${diff > 0 ? 'text-green-400' : diff < 0 ? 'text-red-400' : 'text-white/50'}`}>
                      {diff > 0 ? '+' : ''}{diff}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* All scores recap */}
      <div className="card rounded-2xl overflow-hidden">
        <div className="p-4 border-b border-white/10">
          <h3 className="font-bold">🎮 ผลเกมทั้งหมด</h3>
        </div>
        <div className="divide-y divide-white/5 max-h-80 overflow-y-auto scroll-hidden">
          {schedule.map(game => {
            const sc = scores[game.id];
            const getLabel = (t) => gameType === 'doubles' ? t.map(p => p.name).join(' & ') : t.name;
            if (!sc) return (
              <div key={game.id} className="p-3 flex justify-between text-white/30 text-sm">
                <span>{getLabel(game.home)}</span>
                <span className="font-mono">- : -</span>
                <span>{getLabel(game.away)}</span>
              </div>
            );
            const hw = sc.home > sc.away;
            const aw = sc.away > sc.home;
            return (
              <div key={game.id} className="p-3 flex items-center gap-2 text-sm">
                <span className={`flex-1 text-right truncate ${hw ? 'font-bold text-green-400' : 'text-white/70'}`}>{getLabel(game.home)}</span>
                <span className="font-mono font-black text-white px-2">{sc.home} : {sc.away}</span>
                <span className={`flex-1 truncate ${aw ? 'font-bold text-green-400' : 'text-white/70'}`}>{getLabel(game.away)}</span>
              </div>
            );
          })}
        </div>
      </div>

      <button onClick={onReset} className="w-full py-3 rounded-2xl border border-white/20 hover:bg-white/10 transition-all font-semibold">
        🔄 เริ่มการแข่งขันใหม่
      </button>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState('setup'); // setup | games | results
  const [config, setConfig] = useState(null);
  const [schedule, setSchedule] = useState([]);
  const [scores, setScores] = useState({});

  const handleStart = (cfg) => {
    setConfig(cfg);
    const { players, gameType } = cfg;

    let games = [];
    if (gameType === 'singles') {
      const rounds = generateRoundRobin(players);
      let num = 1;
      rounds.forEach(round => round.forEach(match => {
        games.push({ id: `g-${num}`, gameNum: num++, home: match.home, away: match.away });
      }));
    } else {
      const matches = generateDoubles(players);
      matches.forEach((m, i) => {
        games.push({ id: `g-${i+1}`, gameNum: i+1, home: m.home, away: m.away });
      });
    }

    setSchedule(shuffleArray(games).map((g, i) => ({ ...g, gameNum: i + 1 })));
    setScores({});
    setPhase('games');
  };

  const handleScore = (gameId, home, away) => {
    setScores(prev => ({ ...prev, [gameId]: { home, away } }));
  };

  const handleReset = () => {
    setPhase('setup');
    setConfig(null);
    setSchedule([]);
    setScores({});
  };

  // Tab navigation when in game phase
  const [tab, setTab] = useState('games');

  if (phase === 'setup') return <SetupPage onStart={handleStart} />;

  return (
    <div className="min-h-screen">
      {/* Tab bar */}
      <div className="sticky top-0 z-40 gradient-bg border-b border-white/10">
        <div className="max-w-2xl mx-auto flex">
          {[['games','🏓 เกม'],['results','🏆 ผล']].map(([key, label]) => (
            <button key={key} onClick={() => setTab(key)}
              className={`flex-1 py-3 text-sm font-bold transition-all ${tab === key ? 'tab-active' : 'text-white/50 hover:text-white'}`}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {tab === 'games' && (
        <GamesPage config={config} schedule={schedule} scores={scores}
          onScore={handleScore} onBack={() => { handleReset(); }} />
      )}
      {tab === 'results' && (
        <ResultsPage config={config} schedule={schedule} scores={scores}
          players={config.players} onReset={handleReset} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
