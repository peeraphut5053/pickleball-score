<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── Helpers ──────────────────────────────────────────────────────────────────
function genId(len = 6) {
  return Math.random().toString(36).substring(2, 2 + len).toUpperCase();
}
function parseTime(str) {
  const [h, m] = str.split(':').map(Number);
  return h * 60 + m;
}
function formatTime(minutes) {
  const h = Math.floor(minutes / 60) % 24;
  const m = minutes % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function generateRoundRobin(players) {
  const list = [...players];
  if (list.length % 2 !== 0) list.push({ id: 'BYE', name: 'BYE' });
  const total = list.length;
  const rounds = [];
  for (let r = 0; r < total - 1; r++) {
    const round = [];
    for (let i = 0; i < total / 2; i++) {
      const home = list[i], away = list[total - 1 - i];
      if (home.id !== 'BYE' && away.id !== 'BYE') round.push({ home, away });
    }
    rounds.push(round);
    list.splice(1, 0, list.pop());
  }
  return rounds;
}
function generateDoubles(players) {
  const allPairs = [];
  for (let i = 0; i < players.length; i++)
    for (let j = i + 1; j < players.length; j++)
      allPairs.push([players[i], players[j]]);
  const shuffled = shuffleArray(allPairs);
  const matches = [], used = new Set();
  for (let i = 0; i < shuffled.length; i++) {
    if (used.has(i)) continue;
    for (let j = i + 1; j < shuffled.length; j++) {
      if (used.has(j)) continue;
      const ids1 = new Set(shuffled[i].map(p => p.id));
      if (!shuffled[j].some(p => ids1.has(p.id))) {
        matches.push({ home: shuffled[i], away: shuffled[j] });
        used.add(i); used.add(j); break;
      }
    }
  }
  return matches;
}

// ─── Firebase hooks ───────────────────────────────────────────────────────────
function useSession(sessionId) {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!sessionId) { setLoading(false); return; }
    const ref = db.ref(`sessions/${sessionId}`);
    ref.on('value', snap => {
      setSession(snap.val());
      setLoading(false);
    });
    return () => ref.off();
  }, [sessionId]);

  return { session, loading };
}

// ─── Components ───────────────────────────────────────────────────────────────
function PlayerChip({ name, onRemove }) {
  const colors = ['from-purple-500 to-pink-500','from-blue-500 to-cyan-500','from-green-500 to-teal-500','from-orange-500 to-red-500','from-yellow-500 to-orange-500','from-indigo-500 to-purple-500'];
  const color = colors[name.charCodeAt(0) % colors.length];
  return (
    <div className={`flex items-center gap-2 px-3 py-2 rounded-full bg-gradient-to-r ${color} text-white font-semibold text-sm`}>
      <span>{name}</span>
      {onRemove && <button onClick={onRemove} className="w-4 h-4 rounded-full bg-white/30 hover:bg-white/50 text-xs flex items-center justify-center font-bold">×</button>}
    </div>
  );
}

function ShareBanner({ sessionId }) {
  const url = `${location.origin}${location.pathname}#${sessionId}`;
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(url).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };
  return (
    <div className="card rounded-2xl p-4 border border-green-400/30 space-y-2">
      <div className="flex items-center gap-2">
        <span className="w-2 h-2 rounded-full bg-green-400 pulse-dot inline-block"></span>
        <span className="text-sm font-bold text-green-400">Live Session: #{sessionId}</span>
      </div>
      <p className="text-xs text-white/50">แชร์ลิงค์นี้ให้เพื่อนดูคะแนน real-time</p>
      <div className="flex gap-2">
        <input readOnly value={url} className="flex-1 bg-white/10 rounded-lg px-3 py-1.5 text-xs text-white/70 truncate border border-white/10" />
        <button onClick={copy} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${copied ? 'bg-green-400 text-black' : 'btn-primary'}`}>
          {copied ? '✓ คัดลอก' : 'คัดลอก'}
        </button>
      </div>
    </div>
  );
}

function SetupPage({ onStart, onJoin }) {
  const [players, setPlayers] = useState([]);
  const [newName, setNewName] = useState('');
  const [gameType, setGameType] = useState('singles');
  const [pointsPerGame, setPointsPerGame] = useState(11);
  const [avgMinutes, setAvgMinutes] = useState(20);
  const [startTime, setStartTime] = useState('09:00');
  const [endTime, setEndTime] = useState('12:00');
  const [joinId, setJoinId] = useState('');
  const [joining, setJoining] = useState(false);

  const addPlayer = () => {
    const name = newName.trim();
    if (!name || players.find(p => p.name === name)) return;
    setPlayers(prev => [...prev, { id: `p-${Date.now()}`, name }]);
    setNewName('');
  };

  const minPlayers = gameType === 'singles' ? 2 : 4;
  const canStart = players.length >= minPlayers;
  const totalMinutes = parseTime(endTime) - parseTime(startTime);
  const estimatedGames = gameType === 'singles'
    ? (players.length * (players.length - 1)) / 2
    : Math.floor(players.length / 2) * Math.max(1, Math.floor(players.length / 2) - 1);

  const handleJoin = async () => {
    const id = joinId.trim().toUpperCase();
    if (!id) return;
    setJoining(true);
    const snap = await db.ref(`sessions/${id}`).get();
    if (snap.exists()) { onJoin(id); }
    else { alert('ไม่พบ Session ID นี้'); setJoining(false); }
  };

  return (
    <div className="max-w-2xl mx-auto p-4 space-y-5">
      <div className="text-center py-5">
        <div className="text-5xl mb-2">🏓</div>
        <h1 className="text-3xl font-black neon-green tracking-wide">PICKLEBALL</h1>
        <p className="text-white/60 text-sm mt-1">Score Tracker & Live Tournament</p>
      </div>

      {/* Join existing session */}
      <div className="card rounded-2xl p-5 space-y-3 border border-blue-400/20">
        <h2 className="font-bold text-lg flex items-center gap-2">🔗 เข้าร่วม Session ที่มีอยู่</h2>
        <div className="flex gap-2">
          <input value={joinId} onChange={e => setJoinId(e.target.value.toUpperCase())} maxLength={6}
            placeholder="Session ID (เช่น AB12CD)"
            className="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white placeholder-white/40 focus:outline-none focus:border-blue-400 uppercase tracking-widest font-mono" />
          <button onClick={handleJoin} disabled={joining || !joinId.trim()}
            className="px-4 py-2.5 rounded-xl bg-blue-500 hover:bg-blue-400 font-bold transition-all disabled:opacity-40">
            {joining ? '...' : 'เข้าร่วม'}
          </button>
        </div>
      </div>

      <div className="flex items-center gap-3">
        <div className="flex-1 h-px bg-white/10" />
        <span className="text-white/40 text-sm">หรือสร้างใหม่</span>
        <div className="flex-1 h-px bg-white/10" />
      </div>

      {/* Game Type */}
      <div className="card rounded-2xl p-5 space-y-3">
        <h2 className="font-bold text-lg">🎯 ประเภทการแข่งขัน</h2>
        <div className="grid grid-cols-2 gap-3">
          {[['singles','1v1 (เดี่ยว)','👤'],['doubles','2v2 (คู่)','👥']].map(([val, label, icon]) => (
            <button key={val} onClick={() => setGameType(val)}
              className={`p-3 rounded-xl border-2 font-semibold transition-all ${gameType === val ? 'border-green-400 bg-green-400/20 text-green-300' : 'border-white/20'}`}>
              <div className="text-2xl">{icon}</div>
              <div className="text-sm mt-1">{label}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Players */}
      <div className="card rounded-2xl p-5 space-y-4">
        <h2 className="font-bold text-lg flex items-center gap-2">👥 ผู้เล่น
          <span className="ml-auto text-sm font-normal text-white/50">{players.length} คน</span>
        </h2>
        <div className="flex gap-2">
          <input value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addPlayer()}
            placeholder="ชื่อผู้เล่น..." maxLength={20}
            className="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white placeholder-white/40 focus:outline-none focus:border-green-400" />
          <button onClick={addPlayer} className="btn-primary px-4 py-2.5 rounded-xl">+ เพิ่ม</button>
        </div>
        {players.length > 0 && (
          <div className="flex flex-wrap gap-2">
            {players.map(p => <PlayerChip key={p.id} name={p.name} onRemove={() => setPlayers(prev => prev.filter(x => x.id !== p.id))} />)}
          </div>
        )}
      </div>

      {/* Settings */}
      <div className="card rounded-2xl p-5 space-y-4">
        <h2 className="font-bold text-lg">⚙️ ตั้งค่าเกม</h2>
        <div className="grid grid-cols-2 gap-4">
          <div className="space-y-1.5">
            <label className="text-sm text-white/60">คะแนนต่อเกม</label>
            <div className="grid grid-cols-5 gap-1">
              {[5, 7, 11, 15, 21].map(pt => (
                <button key={pt} onClick={() => setPointsPerGame(pt)}
                  className={`py-2 rounded-lg text-sm font-bold border transition-all ${pointsPerGame === pt ? 'border-green-400 bg-green-400/20 text-green-300' : 'border-white/20'}`}>
                  {pt}
                </button>
              ))}
            </div>
          </div>
          <div className="space-y-1.5">
            <label className="text-sm text-white/60">เวลาเฉลี่ย/เกม (นาที)</label>
            <input type="number" value={avgMinutes} min={5} max={60}
              onChange={e => setAvgMinutes(Number(e.target.value))}
              className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-green-400" />
          </div>
        </div>
        <div className="grid grid-cols-2 gap-4">
          <div className="space-y-1.5">
            <label className="text-sm text-white/60">เริ่มเล่น</label>
            <input type="time" value={startTime} onChange={e => setStartTime(e.target.value)}
              className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-green-400" />
          </div>
          <div className="space-y-1.5">
            <label className="text-sm text-white/60">สิ้นสุด</label>
            <input type="time" value={endTime} onChange={e => setEndTime(e.target.value)}
              className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-green-400" />
          </div>
        </div>
        {canStart && (
          <div className="rounded-xl p-3 text-sm bg-green-400/10 border border-green-400/20 space-y-1">
            <div className="flex justify-between"><span className="text-white/60">จำนวนเกม</span><span className="font-bold">{estimatedGames} เกม</span></div>
            <div className="flex justify-between"><span className="text-white/60">เวลาประมาณ</span><span className="font-bold">{estimatedGames * avgMinutes} / {totalMinutes} นาที</span></div>
          </div>
        )}
      </div>

      <button disabled={!canStart} onClick={() => onStart({ players, gameType, pointsPerGame, avgMinutes, startTime, endTime })}
        className={`w-full py-4 rounded-2xl text-lg font-black transition-all ${canStart ? 'btn-primary shadow-lg' : 'bg-white/10 text-white/30 cursor-not-allowed'}`}>
        {canStart ? '🚀 สร้าง Session & เริ่มแข่ง' : `ต้องการผู้เล่น ≥${minPlayers} คน`}
      </button>
    </div>
  );
}

function ScoreModal({ game, pointsPerGame, onSave, onClose, gameType }) {
  const [homeScore, setHomeScore] = useState(game.homeScore ?? '');
  const [awayScore, setAwayScore] = useState(game.awayScore ?? '');
  const getLabel = t => gameType === 'doubles' ? t.map(p => p.name).join(' & ') : t.name;
  const valid = homeScore !== '' && awayScore !== '' &&
    Number(homeScore) >= 0 && Number(awayScore) >= 0 &&
    (Number(homeScore) === pointsPerGame || Number(awayScore) === pointsPerGame);

  return (
    <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="card rounded-2xl p-6 w-full max-w-sm space-y-5">
        <div className="text-center">
          <div className="text-2xl mb-1">📝</div>
          <h3 className="font-bold text-lg">บันทึกคะแนน</h3>
          <p className="text-white/50 text-xs">เกมที่ {game.gameNum}</p>
        </div>
        <div className="flex items-center gap-3">
          <div className="flex-1 text-center">
            <p className="text-xs text-white/60 mb-2 truncate">{getLabel(game.home)}</p>
            <input type="number" min={0} max={pointsPerGame + 5} value={homeScore}
              onChange={e => setHomeScore(e.target.value)}
              className="score-input w-full" placeholder="0" autoFocus />
          </div>
          <div className="text-2xl font-black text-white/40">VS</div>
          <div className="flex-1 text-center">
            <p className="text-xs text-white/60 mb-2 truncate">{getLabel(game.away)}</p>
            <input type="number" min={0} max={pointsPerGame + 5} value={awayScore}
              onChange={e => setAwayScore(e.target.value)}
              className="score-input w-full" placeholder="0" />
          </div>
        </div>
        {!valid && homeScore !== '' && awayScore !== '' && (
          <p className="text-red-400 text-xs text-center">ผู้ชนะต้องได้ {pointsPerGame} คะแนน</p>
        )}
        <div className="grid grid-cols-2 gap-3">
          <button onClick={onClose} className="py-2.5 rounded-xl border border-white/20 hover:bg-white/10">ยกเลิก</button>
          <button disabled={!valid} onClick={() => onSave(Number(homeScore), Number(awayScore))}
            className={`py-2.5 rounded-xl font-bold ${valid ? 'btn-primary' : 'bg-white/10 text-white/30 cursor-not-allowed'}`}>
            บันทึก ✓
          </button>
        </div>
      </div>
    </div>
  );
}

function GamesPage({ session, sessionId, readOnly }) {
  const [modalGame, setModalGame] = useState(null);
  const { config, schedule, scores = {} } = session;
  const { gameType, pointsPerGame, avgMinutes, startTime } = config;
  const getLabel = t => gameType === 'doubles' ? t.map(p => p.name).join(' & ') : t.name;
  const completedCount = schedule.filter(g => scores[g.id]).length;

  const saveScore = async (gameId, home, away) => {
    await db.ref(`sessions/${sessionId}/scores/${gameId}`).set({ home, away });
  };

  return (
    <div className="max-w-2xl mx-auto p-4 space-y-4">
      <ShareBanner sessionId={sessionId} />

      {readOnly && (
        <div className="bg-blue-500/20 border border-blue-400/30 rounded-xl p-3 text-sm text-blue-300 text-center">
          👁 โหมดดู — คะแนนอัปเดต real-time อัตโนมัติ
        </div>
      )}

      <div className="flex items-center gap-3">
        <div>
          <h2 className="font-bold text-xl">🏓 ตารางแข่งขัน</h2>
          <p className="text-white/50 text-xs">{completedCount}/{schedule.length} เกมเสร็จสิ้น</p>
        </div>
        <div className="ml-auto text-right">
          <div className="text-2xl font-black neon-green">{Math.round(completedCount / schedule.length * 100) || 0}%</div>
        </div>
      </div>

      <div className="h-2 bg-white/10 rounded-full overflow-hidden">
        <div className="h-full bg-gradient-to-r from-green-400 to-teal-400 transition-all duration-500 rounded-full"
          style={{ width: `${(completedCount / schedule.length) * 100}%` }} />
      </div>

      <div className="space-y-3">
        {schedule.map((game, idx) => {
          const sc = scores[game.id];
          const done = !!sc;
          const winner = done ? (sc.home > sc.away ? 'home' : sc.away > sc.home ? 'away' : 'draw') : null;
          return (
            <div key={game.id}
              className={`card rounded-2xl p-4 game-card ${!readOnly ? 'cursor-pointer' : ''} ${done ? 'completed-game' : 'pending-game'}`}
              onClick={() => !readOnly && setModalGame({ ...game, homeScore: sc?.home, awayScore: sc?.away })}>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs text-white/40 font-mono">เกมที่ {game.gameNum}</span>
                <span className="text-xs text-white/40 font-mono">{formatTime(parseTime(startTime) + idx * avgMinutes)}</span>
                {done ? <span className="text-xs bg-green-400/20 text-green-400 px-2 py-0.5 rounded-full">✓ เสร็จ</span>
                  : <span className="text-xs bg-white/10 text-white/50 px-2 py-0.5 rounded-full">⏳ รอ</span>}
              </div>
              <div className="flex items-center gap-3">
                <div className={`flex-1 text-center ${done && winner === 'home' ? 'text-green-400 font-black' : ''}`}>
                  <p className="text-sm font-semibold truncate">{getLabel(game.home)}</p>
                  {done && <p className="text-2xl font-black">{sc.home}</p>}
                </div>
                <div className="text-lg font-black text-white/30">VS</div>
                <div className={`flex-1 text-center ${done && winner === 'away' ? 'text-green-400 font-black' : ''}`}>
                  <p className="text-sm font-semibold truncate">{getLabel(game.away)}</p>
                  {done && <p className="text-2xl font-black">{sc.away}</p>}
                </div>
              </div>
              {!done && !readOnly && <p className="text-center text-white/30 text-xs mt-2">แตะเพื่อบันทึกคะแนน</p>}
            </div>
          );
        })}
      </div>

      {modalGame && (
        <ScoreModal game={modalGame} pointsPerGame={pointsPerGame} gameType={gameType}
          onClose={() => setModalGame(null)}
          onSave={(h, a) => { saveScore(modalGame.id, h, a); setModalGame(null); }} />
      )}
    </div>
  );
}

function ResultsPage({ session, sessionId, onReset, readOnly }) {
  const { config, schedule, scores = {}, players } = session;
  const { gameType } = config;

  const standings = useMemo(() => {
    const map = {};
    players.forEach(p => { map[p.id] = { ...p, w: 0, l: 0, pf: 0, pa: 0, games: 0 }; });
    schedule.forEach(game => {
      const sc = scores[game.id];
      if (!sc) return;
      const homeIds = gameType === 'doubles' ? game.home.map(p => p.id) : [game.home.id];
      const awayIds = gameType === 'doubles' ? game.away.map(p => p.id) : [game.away.id];
      homeIds.forEach(id => { if (!map[id]) return; map[id].pf += sc.home; map[id].pa += sc.away; map[id].games++; sc.home > sc.away ? map[id].w++ : map[id].l++; });
      awayIds.forEach(id => { if (!map[id]) return; map[id].pf += sc.away; map[id].pa += sc.home; map[id].games++; sc.away > sc.home ? map[id].w++ : map[id].l++; });
    });
    return Object.values(map).sort((a, b) => b.w !== a.w ? b.w - a.w : (b.pf - b.pa) - (a.pf - a.pa));
  }, [schedule, scores, players, gameType]);

  const winner = standings[0];
  const completedGames = schedule.filter(g => scores[g.id]).length;

  return (
    <div className="max-w-2xl mx-auto p-4 space-y-5">
      <ShareBanner sessionId={sessionId} />

      {completedGames > 0 && winner?.games > 0 && (
        <div className="card rounded-2xl p-6 text-center winner-glow border border-green-400/40">
          <div className="text-5xl mb-2">👑</div>
          <p className="text-white/60 text-sm">ผู้นำ</p>
          <h3 className="text-3xl font-black neon-green mt-1">{winner.name}</h3>
          <div className="flex justify-center gap-6 mt-3 text-sm">
            <div><span className="text-white/50">ชนะ </span><span className="font-bold text-green-400">{winner.w}</span></div>
            <div><span className="text-white/50">แพ้ </span><span className="font-bold text-red-400">{winner.l}</span></div>
            <div><span className="text-white/50">+/- </span><span className={`font-bold ${winner.pf - winner.pa >= 0 ? 'text-green-400' : 'text-red-400'}`}>{winner.pf - winner.pa > 0 ? '+' : ''}{winner.pf - winner.pa}</span></div>
          </div>
        </div>
      )}

      <div className="card rounded-2xl overflow-hidden">
        <div className="p-4 border-b border-white/10"><h3 className="font-bold">📊 ตารางคะแนน</h3></div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-white/40 text-xs border-b border-white/10">
                <th className="p-3 text-left">#</th>
                <th className="p-3 text-left">ชื่อ</th>
                <th className="p-3 text-center">W</th>
                <th className="p-3 text-center">L</th>
                <th className="p-3 text-center">ได้</th>
                <th className="p-3 text-center">เสีย</th>
                <th className="p-3 text-center">+/-</th>
              </tr>
            </thead>
            <tbody>
              {standings.map((p, idx) => {
                const diff = p.pf - p.pa;
                return (
                  <tr key={p.id} className={`border-b border-white/5 ${idx === 0 && p.games > 0 ? 'bg-green-400/5' : ''}`}>
                    <td className="p-3 font-bold">{['🥇','🥈','🥉'][idx] || `${idx+1}.`}</td>
                    <td className="p-3 font-semibold">{p.name}</td>
                    <td className="p-3 text-center text-green-400 font-bold">{p.w}</td>
                    <td className="p-3 text-center text-red-400 font-bold">{p.l}</td>
                    <td className="p-3 text-center">{p.pf}</td>
                    <td className="p-3 text-center">{p.pa}</td>
                    <td className={`p-3 text-center font-bold ${diff > 0 ? 'text-green-400' : diff < 0 ? 'text-red-400' : 'text-white/50'}`}>{diff > 0 ? '+' : ''}{diff}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      <div className="card rounded-2xl overflow-hidden">
        <div className="p-4 border-b border-white/10"><h3 className="font-bold">🎮 ผลเกมทั้งหมด</h3></div>
        <div className="divide-y divide-white/5 max-h-80 overflow-y-auto scroll-hidden">
          {schedule.map(game => {
            const sc = scores[game.id];
            const getLabel = t => gameType === 'doubles' ? t.map(p => p.name).join(' & ') : t.name;
            if (!sc) return (
              <div key={game.id} className="p-3 flex justify-between text-white/30 text-sm">
                <span className="truncate flex-1">{getLabel(game.home)}</span>
                <span className="font-mono px-2">- : -</span>
                <span className="truncate flex-1 text-right">{getLabel(game.away)}</span>
              </div>
            );
            return (
              <div key={game.id} className="p-3 flex items-center gap-2 text-sm">
                <span className={`flex-1 text-right truncate ${sc.home > sc.away ? 'font-bold text-green-400' : 'text-white/70'}`}>{getLabel(game.home)}</span>
                <span className="font-mono font-black text-white px-2">{sc.home} : {sc.away}</span>
                <span className={`flex-1 truncate ${sc.away > sc.home ? 'font-bold text-green-400' : 'text-white/70'}`}>{getLabel(game.away)}</span>
              </div>
            );
          })}
        </div>
      </div>

      {!readOnly && (
        <button onClick={onReset} className="w-full py-3 rounded-2xl border border-white/20 hover:bg-white/10 transition-all font-semibold">
          🔄 เริ่มการแข่งขันใหม่
        </button>
      )}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [sessionId, setSessionId] = useState(() => location.hash.replace('#','') || null);
  const [tab, setTab] = useState('games');
  const { session, loading } = useSession(sessionId);
  const readOnly = !!location.hash.replace('#','') && sessionId !== null;

  // Sync URL hash
  useEffect(() => {
    if (sessionId) location.hash = sessionId;
    else location.hash = '';
  }, [sessionId]);

  const handleStart = async (cfg) => {
    const id = genId();
    let games = [];
    if (cfg.gameType === 'singles') {
      const rounds = generateRoundRobin(cfg.players);
      let num = 1;
      rounds.forEach(round => round.forEach(match => games.push({ id: `g-${num}`, gameNum: num++, home: match.home, away: match.away })));
    } else {
      generateDoubles(cfg.players).forEach((m, i) => games.push({ id: `g-${i+1}`, gameNum: i+1, home: m.home, away: m.away }));
    }
    games = shuffleArray(games).map((g, i) => ({ ...g, gameNum: i + 1 }));

    await db.ref(`sessions/${id}`).set({
      config: cfg,
      players: cfg.players,
      schedule: games,
      scores: {},
      createdAt: Date.now(),
    });
    setSessionId(id);
  };

  const handleJoin = (id) => setSessionId(id);
  const handleReset = () => { setSessionId(null); location.hash = ''; };

  if (loading && sessionId) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center space-y-3">
          <div className="text-4xl">🏓</div>
          <p className="text-white/60">กำลังโหลด session...</p>
        </div>
      </div>
    );
  }

  if (!sessionId || !session) {
    return <SetupPage onStart={handleStart} onJoin={handleJoin} />;
  }

  return (
    <div className="min-h-screen">
      <div className="sticky top-0 z-40 gradient-bg border-b border-white/10">
        <div className="max-w-2xl mx-auto flex">
          {[['games','🏓 เกม'],['results','🏆 ผล']].map(([key, label]) => (
            <button key={key} onClick={() => setTab(key)}
              className={`flex-1 py-3 text-sm font-bold transition-all ${tab === key ? 'tab-active' : 'text-white/50 hover:text-white'}`}>
              {label}
            </button>
          ))}
          {!readOnly && (
            <button onClick={handleReset} className="px-4 py-3 text-white/40 hover:text-white text-xs">ออก</button>
          )}
        </div>
      </div>

      {tab === 'games' && <GamesPage session={session} sessionId={sessionId} readOnly={false} />}
      {tab === 'results' && <ResultsPage session={session} sessionId={sessionId} onReset={handleReset} readOnly={false} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
